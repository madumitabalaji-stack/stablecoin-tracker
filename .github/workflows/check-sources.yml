name: Weekly Source Check

on:
  schedule:
    - cron: '0 9 * * 1'   # Every Monday at 9am UTC
  workflow_dispatch:        # Also runnable manually from the Actions tab

permissions:
  contents: write
  issues: write

jobs:
  check:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: pip install requests beautifulsoup4 pypdf

      - name: Run source check
        id: check
        run: python scripts/check-sources.py
        continue-on-error: true

      - name: Open issue if sources changed
        if: steps.check.outcome == 'failure'
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const report = JSON.parse(fs.readFileSync('change-report.json', 'utf8'));
            const lines = report.changed
              .map(c => `- **${c.name}**: [${c.url}](${c.url})`)
              .join('\n');
            await github.rest.issues.create({
              owner: context.repo.owner,
              repo: context.repo.repo,
              title: `Source update detected — ${report.date}`,
              body: [
                '## Primary sources changed',
                '',
                'The weekly source check found content changes at the following URLs.',
                'Review each one against the current card text in `data/states.json`',
                'and update the `detail`, `effective`, `lastVerified`, and any other',
                'affected fields if the law has changed.',
                '',
                lines,
                '',
                '---',
                '_Generated by the [weekly source check](.github/workflows/check-sources.yml) workflow._'
              ].join('\n'),
              labels: ['needs-review']
            });

      - name: Commit updated hashes
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/source-hashes.json
          git diff --staged --quiet || git commit -m "chore: update source hashes [$(date -u +%Y-%m-%d)]"
          git push
